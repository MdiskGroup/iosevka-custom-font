name: Build Iosevka Font

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone Iosevka
        run: |
          git clone --depth 1 https://github.com/be5invis/Iosevka.git source

      - name: Copy Build Plan
        run: |
          cp private-build-plans.toml source/private-build-plans.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        working-directory: source
        run: npm install
      
      - name: Install ttfautohint
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint
      
      - name: Build Font
        working-directory: source
        run: npm run build -- ttf::IosevkaCustom

      - name: List Generated Files
        run: |
          find source -type f | sort

      - name: Upload Font
        uses: actions/upload-artifact@v4
        with:
          name: IosevkaCustom
          path: source/dist/IosevkaCustom/**
